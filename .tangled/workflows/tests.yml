when:
  - event: ["push"]
    branch: ["*"]
  - event: ["pull_request"]
    branch: ["main"]

engine: kubernetes
image: golang:1.22-bookworm
architecture: amd64

steps:
  - name: Download dependencies
    environment:
      CGO_ENABLED: "0"
    command: |
      go mod download
      go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.19

  - name: Run Tests
    environment:
      CGO_ENABLED: "0"
    command: |
      KUBEBUILDER_ASSETS="$(setup-envtest use 1.31.0 -p path)" go test $(go list ./... | grep -v /e2e) -cover
